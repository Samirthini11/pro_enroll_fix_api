# Apache site config for Ubuntu VPS (98.93.105.128)
#
# Install:
#   sudo cp deploy/apache-pro-enroll.conf /etc/apache2/conf-available/pro-enroll.conf
#   sudo a2enconf pro-enroll
#   sudo a2enmod rewrite headers
#   sudo systemctl reload apache2
#
# Adjust paths if your project is not under /var/www/html/pro_enroll_api

Alias /pro_enroll_api /var/www/html/pro_enroll_api/public

<Directory /var/www/html/pro_enroll_api/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    DirectoryIndex index.php
    Require all granted
</Directory>

# Project root (test_connection.php, README.md, root .htaccess)
<Directory /var/www/html/pro_enroll_api>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    DirectoryIndex index.php
    Require all granted
</Directory>
