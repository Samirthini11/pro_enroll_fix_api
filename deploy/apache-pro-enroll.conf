# Apache site config for Ubuntu VPS (98.93.105.128)
#
# Install:
#   sudo cp deploy/apache-pro-enroll.conf /etc/apache2/conf-available/pro-enroll.conf
#   sudo a2enconf pro-enroll
#   sudo a2enmod rewrite headers
#   sudo systemctl reload apache2
#
# Adjust paths if your project is not under /var/www/html/pro_enroll_api

# /pro_enroll_api already points at public/ — strip accidental /public/ from URLs
RedirectMatch 301 ^/pro_enroll_api/public/(.*)$ /pro_enroll_api/$1

Alias /pro_enroll_api /var/www/html/pro_enroll_api/public

<Directory /var/www/html/pro_enroll_api/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    DirectoryIndex index.php
    Require all granted

    # Route /v1/* → index.php (works without .htaccess AllowOverride)
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ index.php [L]
</Directory>

# Project root (test_connection.php, README.md, root .htaccess)
<Directory /var/www/html/pro_enroll_api>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    DirectoryIndex index.php
    Require all granted
</Directory>
